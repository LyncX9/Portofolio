services:
  - type: web
    name: portfolio-api
    runtime: node
    region: singapore  # closest to Indonesia
    plan: free
    buildCommand: npm install --include=dev && npm run build-only
    startCommand: NODE_ENV=production npx tsx server/index.ts
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ADMIN_USERNAME
        value: reville
      - key: ADMIN_PASSWORD
        generateValue: false   # set manually in Render dashboard
        sync: false
      - key: SESSION_SECRET
        generateValue: true    # Render auto-generates a secure random value
      - key: CLIENT_URL
        value: https://portfolio-api.onrender.com
      - key: SUPABASE_URL
        value: https://mtushsmaczxcekdhkbpe.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        generateValue: false
        sync: false
